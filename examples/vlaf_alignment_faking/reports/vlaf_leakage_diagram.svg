<svg viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', 'Menlo', monospace" font-size="13">
  <title>SIEVE Leakage Test — AUROC by condition</title>
  <desc>Bar chart showing probe AUROC collapses from 1.000 (full text) to 0.500 (tag removed) while random span removal only drops it to 0.917.</desc>

  <!-- Background -->
  <rect width="560" height="320" fill="#ffffff"/>

  <!-- Title -->
  <text x="280" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111">SIEVE Leakage Test — Probe AUROC by Condition</text>
  <text x="280" y="44" text-anchor="middle" font-size="11" fill="#666">OLMo-2-1124-7B-Instruct · layer 12 · n=500</text>

  <!-- Chart area: x=80..480, y=60..240 (height=180) -->
  <!-- Y-axis: 0.4 to 1.05 -->

  <!-- Gridlines -->
  <line x1="80" y1="60" x2="480" y2="60" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="96" x2="480" y2="96" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="132" x2="480" y2="132" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="168" x2="480" y2="168" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="204" x2="480" y2="204" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="240" x2="480" y2="240" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Chance line at AUROC=0.500 -->
  <!-- 0.500 on scale 0.4–1.05: (0.500-0.4)/(1.05-0.4) * 180 = 0.1/0.65 * 180 = 27.7 px from bottom => y = 240 - 27.7 = 212.3 -->
  <line x1="80" y1="212" x2="480" y2="212" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="484" y="216" font-size="10" fill="#dc2626">chance</text>

  <!-- Y-axis labels -->
  <!-- scale: y = 240 - (val - 0.4)/0.65 * 180 -->
  <!-- 0.40 => y=240 -->
  <text x="72" y="244" text-anchor="end" font-size="11" fill="#555">0.40</text>
  <!-- 0.50 => y=212 -->
  <text x="72" y="216" text-anchor="end" font-size="11" fill="#555">0.50</text>
  <!-- 0.60 => y=213-27=185 ? let me recalc: 0.60: (0.60-0.40)/0.65*180 = 0.20/0.65*180=55.4 => y=240-55=185 -->
  <text x="72" y="189" text-anchor="end" font-size="11" fill="#555">0.60</text>
  <!-- 0.70 => 0.30/0.65*180=83.1 => y=240-83=157 -->
  <text x="72" y="161" text-anchor="end" font-size="11" fill="#555">0.70</text>
  <!-- 0.80 => 0.40/0.65*180=110.8 => y=240-111=129 -->
  <text x="72" y="133" text-anchor="end" font-size="11" fill="#555">0.80</text>
  <!-- 0.90 => 0.50/0.65*180=138.5 => y=240-138=102 -->
  <text x="72" y="106" text-anchor="end" font-size="11" fill="#555">0.90</text>
  <!-- 1.00 => 0.60/0.65*180=166.2 => y=240-166=74 -->
  <text x="72" y="78" text-anchor="end" font-size="11" fill="#555">1.00</text>

  <!-- Y axis line -->
  <line x1="80" y1="60" x2="80" y2="240" stroke="#9ca3af" stroke-width="1"/>
  <line x1="80" y1="240" x2="480" y2="240" stroke="#9ca3af" stroke-width="1"/>

  <!-- Bar 1: Full text, AUROC=1.000 => y=240-166=74, height=166 -->
  <!-- bar x=120, width=80 -->
  <rect x="120" y="74" width="90" height="166" fill="#16a34a" rx="3"/>
  <text x="165" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">1.000</text>
  <text x="165" y="275" text-anchor="middle" font-size="11" fill="#374151">Full text</text>

  <!-- Bar 2: Tag removed, AUROC=0.500 => height=27.7, y=240-28=212 -->
  <!-- bar x=235, width=80 -->
  <rect x="235" y="212" width="90" height="28" fill="#dc2626" rx="3"/>
  <text x="280" y="204" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">0.500</text>
  <text x="280" y="275" text-anchor="middle" font-size="11" fill="#374151">Tag removed</text>
  <text x="280" y="289" text-anchor="middle" font-size="10" fill="#6b7280">(&lt;is_free_tier_user&gt;)</text>

  <!-- Bar 3: Random span removed, AUROC=0.917 => (0.917-0.40)/0.65*180 = 0.517/0.65*180 = 143.2 => y=240-143=97 -->
  <!-- bar x=350, width=80 -->
  <rect x="350" y="97" width="90" height="143" fill="#d97706" rx="3"/>
  <text x="395" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">0.917</text>
  <text x="395" y="275" text-anchor="middle" font-size="11" fill="#374151">Random span</text>
  <text x="395" y="289" text-anchor="middle" font-size="10" fill="#6b7280">removed</text>

  <!-- Delta annotation: bracket between bar1 and bar2 -->
  <line x1="165" y1="74" x2="165" y2="212" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="74" x2="170" y2="74" stroke="#374151" stroke-width="1"/>
  <line x1="160" y1="212" x2="170" y2="212" stroke="#374151" stroke-width="1"/>
  <text x="156" y="147" text-anchor="end" font-size="11" font-weight="600" fill="#374151">Δ=−0.50</text>

  <!-- Y-axis label -->
  <text x="24" y="160" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,24,160)">Probe AUROC</text>

  <!-- Legend note -->
  <text x="280" y="313" text-anchor="middle" font-size="10" fill="#9ca3af">Collapse to chance is specific to the oversight tag (random-span control = 0.917)</text>
</svg>
