name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (engine + dev deps; GPU/runner extras not needed for the suite)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Self-test — six rigged scenarios must return their rigged verdicts
        run: sieve selftest
      - name: Test suite
        run: pytest
